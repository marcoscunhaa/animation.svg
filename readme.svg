<svg fill="none" width="1000" height="200" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="1000" height="200">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>			
				@keyframes gradientBackground {
					0% {
						background-position: 0% 50%;
					}
					50% {
						background-position: 100% 50%;
					}
					100% {
						background-position: 0% 50%;
					}
				}
			
				.container {
					font-family:
						system-ui,
						-apple-system,
						'Segoe UI',
						Roboto,
						Helvetica,
						Arial,
						sans-serif,
						'Apple Color Emoji',
						'Segoe UI Emoji';
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					margin: 0;
					width: 100%;
					height: 200px;
					background-size: 600% 400%;
					animation: gradientBackground 10s ease infinite;
					border-radius: 10px;
					color: white;
					text-align: center;
				}
        
        .wrapper {
            height: 200px;
            /*This part is important for centering*/
            display: flex;
            align-items: center;
            justify-content: center;
        } 
        .typing-demo {
    width: fit-content;
    animation: typing 4s steps(30), blink .3s step-end infinite alternate;
}
				.typing-demo b {
					text-decoration: underline;
				}

        @keyframes typing {
        from {
            width: 0
        }
        }
            
        @keyframes blink {
        50% {
            border-color: transparent
        }
        }
			</style>
			<div class="container">
        <div class="wrapper">
            <div class="typing-demo">
                <b>✨ Hi, I'm Marcos Cunha!</b>
            </div>        
        </div>
			</div>
		</div>
	</foreignObject>
</svg>
